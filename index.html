<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phim mới</title>

<style>
*{
  box-sizing:border-box;
}

body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
  padding:15px;
}

h1{
  margin-bottom:20px;
  text-align:center;
}

/* SEARCH */
.search-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.search-box input{
  padding:10px;
  width:300px;
  max-width:100%;
  border-radius:6px;
  border:none;
  outline:none;
}

.search-box button{
  padding:10px 18px;
  background:red;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.search-box button:hover{
  background:#cc0000;
}

/* MOVIES GRID */
.movies{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}

/* MOVIE ITEM */
.movie{
  background:#111;
  border-radius:8px;
  overflow:hidden;
  transition:0.2s;
}

.movie:hover{
  transform:scale(1.05);
}

.movie img{
  width:100%;
  height:240px;
  object-fit:cover;
  background:#222;
}

.movie p{
  font-size:14px;
  padding:8px;
  margin:0;
}

/* Mobile tối ưu */
@media(max-width:480px){
  .movie img{
    height:200px;
  }
}
</style>
</head>
<body>

<h1>65CTT3</h1>

<div class="search-box">
  <input id="keyword" placeholder="Nhập tên phim...">
  <button onclick="searchMovie()">Tìm</button>
</div>

<div class="movies" id="movies"></div>

<script>

const movies = document.getElementById("movies");


// ================== LOAD PHIM MỚI ==================
async function loadMovies(){
  const res = await fetch("/api/phim-moi");
  const data = await res.json();
  render(data.items || []);
}


// ================== TÌM KIẾM ==================
async function searchMovie(){

  const keyword = document.getElementById("keyword").value.trim();

  if(!keyword){
    loadMovies();
    return;
  }

  const res = await fetch(
    `/api/tim-kiem?keyword=${encodeURIComponent(keyword)}&page=1&limit=20`
  );

  const data = await res.json();

  if(data.data && data.data.items){
    render(data.data.items);
  }else{
    render([]);
  }
}


// ================== RENDER ==================
function render(list){

  movies.innerHTML = "";

  if(!list || list.length === 0){
    movies.innerHTML = "<p>Không tìm thấy phim</p>";
    return;
  }

  list.forEach(movie=>{

    let url = movie.poster_url || movie.thumb_url || "";

    if(url && !url.startsWith("http")){
      url = "https://phimimg.com/" + url.replace(/^\/+/, "");
    }

    const imageUrl = url
      ? `https://phimapi.com/image.php?url=${url}`
      : "https://via.placeholder.com/300x450?text=No+Image";

    movies.innerHTML += `
      <div class="movie">
        <a href="movie.html?slug=${movie.slug}" style="color:white;text-decoration:none">
          <img src="${imageUrl}" loading="lazy">
          <p>${movie.name}</p>
        </a>
      </div>
    `;
  });
}

loadMovies();

</script>

</body>
</html>
