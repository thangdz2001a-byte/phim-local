<body>

<div id="player"></div>
<div id="content"></div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

async function loadMovie(){
  const res = await fetch(`/api/phim/${slug}`);
  const data = await res.json();

  const movie = data.movie;
  const episodes = data.episodes || [];

  // set video mặc định tập đầu
  const firstLink = episodes?.[0]?.server_data?.[0]?.link_embed;

  if(firstLink){
    watch(firstLink);
  }

  let html = `
    <h1>${movie.name}</h1>
    <h3>Danh sách tập:</h3>
  `;

  episodes.forEach(server=>{
    html += `<h4>${server.server_name}</h4>`;
    html += server.server_data.map(ep=>`
      <button onclick="watch('${ep.link_embed}')">
        ${ep.name}
      </button>
    `).join("");
  });

  document.getElementById("content").innerHTML = html;
}

function watch(link){
  document.getElementById("player").innerHTML = `
    <iframe src="${link}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>
  `;
}

loadMovie();
</script>

</body>
